services:
  # ── BACKEND API uniquement ─────────────────────────────────────────────────
  # Le FRONTEND est déployé séparément sur Cloudflare Pages.
  - type: web
    name: enfants-adam-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Base de données Neon (PostgreSQL serverless)
      # Récupérer depuis : https://console.neon.tech → votre projet → Connection string
      - key: DATABASE_URL
        sync: false
      # Sécurité
      - key: JWT_SECRET
        sync: false
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: JWT_EXPIRE
        value: 7d
      # Admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NUMERO_H
        value: "G0C0P0R0E0F0 0"
      # CORS — mettre l'URL Cloudflare Pages (ex: https://enfants-adam.pages.dev)
      - key: CORS_ORIGIN
        sync: false
      # Email (Brevo)
      - key: BREVO_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: noreply@enfants-adam.app
      - key: FROM_NAME
        value: "Les Enfants d'Adam"
      # Paiement Flutterwave
      - key: FLW_PUBLIC_KEY
        sync: false
      - key: FLW_SECRET_KEY
        sync: false
      - key: FLW_ENCRYPTION_KEY
        sync: false
      - key: FLW_WEBHOOK_HASH
        sync: false
      # Upload
      - key: MAX_FILE_SIZE
        value: "10485760"
      # Désactiver le démarrage auto du serveur IA Python (non disponible sur Render)
      - key: DISABLE_IA_AUTO_START
        value: "true"
    healthCheckPath: /api/health
