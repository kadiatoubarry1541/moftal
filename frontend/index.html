<!doctype html>
<html lang="fr" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0, user-scalable=yes" />
    <meta name="theme-color" content="#065f46" />
    <meta name="description" content="Les Enfants d'Adam - Plateforme guinéenne d'enregistrement généalogique, santé, éducation et solidarité." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="color-scheme" content="light" />
    <meta name="robots" content="index, follow" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/logo-moftal.svg" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Preload LCP -->
    <link rel="preload" as="image" href="/icon-192.png" type="image/png" fetchpriority="high" />

    <!-- Preconnect backend : connexion TCP établie avant la 1ère requête API -->
    <link rel="preconnect" href="https://enfants-adam-backend.onrender.com" crossorigin />
    <link rel="dns-prefetch" href="https://enfants-adam-backend.onrender.com" />

    <!-- Forcer le mode clair toujours -->
    <script>
      (function(){try{document.documentElement.classList.remove('dark');document.documentElement.classList.add('light');localStorage.setItem('theme','light');}catch(e){}})();
    </script>

    <title>Moftal</title>
  </head>
  <body style="background-color:#ffffff;color-scheme:light;">
    <div id="root" style="background-color:#ffffff;"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
