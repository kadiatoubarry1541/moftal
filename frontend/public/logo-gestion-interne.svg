<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 700" width="700" height="700">
  <rect width="700" height="700" fill="#ffffff"/>

  <!-- Carré arrondi violet (symbole distinctif, sans spirale) -->
  <rect x="85" y="85" width="530" height="380" rx="52" fill="#3b0764"/>

  <!-- Barres de dashboard (représentent la gestion administrative) -->
  <!-- Barre 1 — longue, cyan -->
  <rect x="140" y="145" width="420" height="36" rx="18" fill="#0891b2"/>
  <!-- Barre 2 — moyenne, blanc -->
  <rect x="140" y="210" width="310" height="36" rx="18" fill="white" opacity="0.92"/>
  <!-- Barre 3 — courte, blanc légèrement transparent -->
  <rect x="140" y="275" width="250" height="36" rx="18" fill="white" opacity="0.7"/>
  <!-- Barre 4 — très courte, blanc léger -->
  <rect x="140" y="340" width="175" height="36" rx="18" fill="white" opacity="0.45"/>

  <!-- Points indicateurs à gauche de chaque barre -->
  <circle cx="125" cy="163" r="10" fill="#0891b2"/>
  <circle cx="125" cy="228" r="10" fill="white"/>
  <circle cx="125" cy="293" r="10" fill="white" opacity="0.7"/>
  <circle cx="125" cy="358" r="10" fill="white" opacity="0.45"/>

  <!-- Icône settings en haut à droite du carré -->
  <circle cx="550" cy="163" r="28" fill="none" stroke="#C9A227" stroke-width="6"/>
  <circle cx="550" cy="163" r="10" fill="#C9A227"/>
  <line x1="550" y1="125" x2="550" y2="138" stroke="#C9A227" stroke-width="6" stroke-linecap="round"/>
  <line x1="550" y1="188" x2="550" y2="201" stroke="#C9A227" stroke-width="6" stroke-linecap="round"/>
  <line x1="512" y1="163" x2="525" y2="163" stroke="#C9A227" stroke-width="6" stroke-linecap="round"/>
  <line x1="575" y1="163" x2="588" y2="163" stroke="#C9A227" stroke-width="6" stroke-linecap="round"/>

  <!-- Ligne décorative violet -->
  <rect x="85" y="510" width="530" height="7" rx="3.5" fill="#4c1d95"/>

  <!-- Texte "Gestion" en violet -->
  <text x="350" y="583"
    text-anchor="middle"
    fill="#3b0764"
    font-size="100"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="800"
    letter-spacing="3">Gestion</text>

  <!-- Texte "Interne" en gris/violet clair -->
  <text x="350" y="651"
    text-anchor="middle"
    fill="#475569"
    font-size="65"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="700"
    letter-spacing="18">Interne</text>
</svg>
