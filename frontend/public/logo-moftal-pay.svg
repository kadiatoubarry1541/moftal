<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 700" width="700" height="700">
  <rect width="700" height="700" fill="#ffffff"/>

  <!-- Hexagone bleu marine (symbole distinctif, sans spirale) -->
  <polygon points="570,295 460,490 240,490 130,295 240,100 460,100" fill="#0d2040"/>

  <!-- Bordure or fine autour de l'hexagone -->
  <polygon points="570,295 460,490 240,490 130,295 240,100 460,100"
    fill="none" stroke="#C9A227" stroke-width="7"/>

  <!-- Lettre M en or, centrée dans l'hexagone -->
  <text x="350" y="320"
    text-anchor="middle" dominant-baseline="middle"
    fill="#C9A227"
    font-size="170"
    font-family="Arial Black, Impact, Arial, sans-serif"
    font-weight="900">M</text>

  <!-- Deux lignes horizontales en or sous le M (symbole de paiement) -->
  <line x1="220" y1="370" x2="340" y2="370" stroke="#C9A227" stroke-width="7" stroke-linecap="round"/>
  <line x1="220" y1="395" x2="310" y2="395" stroke="#C9A227" stroke-width="5" stroke-linecap="round"/>

  <!-- Cercle "pièce" en bas à droite de l'hexagone -->
  <circle cx="430" cy="382" r="38" fill="none" stroke="#C9A227" stroke-width="7"/>
  <text x="430" y="390" text-anchor="middle" dominant-baseline="middle"
    fill="#C9A227" font-size="26" font-family="Arial, sans-serif" font-weight="900">GNF</text>

  <!-- Ligne décorative or -->
  <rect x="85" y="530" width="530" height="7" rx="3.5" fill="#C9A227"/>

  <!-- Texte "Moftal" en bleu marine -->
  <text x="350" y="613"
    text-anchor="middle"
    fill="#0d2040"
    font-size="95"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="800"
    letter-spacing="5">Moftal</text>

  <!-- Texte "Pay" en or, superposé à droite du nom -->
  <text x="560" y="660"
    text-anchor="middle"
    fill="#C9A227"
    font-size="46"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="700"
    letter-spacing="4">Pay</text>
</svg>
